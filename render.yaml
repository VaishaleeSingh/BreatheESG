services:
  # -------------------------
  # 1. Django Backend API
  # -------------------------
  - type: web
    name: breathe-esg-backend
    env: python
    region: oregon
    buildCommand: "bash ./backend/build.sh"
    startCommand: "gunicorn breathe_esg.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
    rootDir: "backend"

  # -------------------------
  # 2. React Frontend
  # -------------------------
  - type: web
    name: breathe-esg-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: "/api/*"
        destination: "https://breathe-esg-backend.onrender.com/api/*"
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    rootDir: "frontend"

databases:
  # -------------------------
  # 3. PostgreSQL Database
  # -------------------------
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_user
    region: oregon
    plan: free
